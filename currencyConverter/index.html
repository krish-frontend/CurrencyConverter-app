
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- //heading div// -->
    <div class="container">
        <h2>
            Currency Converter
        </h2>      

        <!-- //amount div// -->
        <form action="#">
            <div>
                <b><p>Enter Amount</p></b>
                <input value="100" type="text">
            </div>
            <br>

            <!-- DROPDWON FOR currecy -->
            <div class="dropdown">
                <div class="from"> 
                   <b><p>From</p></b> 
                    <div class="container-select">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="#">
                        <select name="from" class="select">
                           
                        </select>
                    </div>
                </div><br><br>

               <b><p class="exchangeSign">&#8644;</p></b> <br>

                <div class="to">
                    <b><p>To</p></b>
                    <div class="container-select">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt="">
                        <select name="to" class="select">
                            
                        </select>
                    </div>
                </div> <br>     
                
            </div>
            
            <div>
                <b><p id="MssgBox">1 USD = 80 INR</p></b>
                <br>
                <button> Get Exchange Rate</button>
            </div>
        </form>
    </div>

    
    <script src="countryCode.js"></script>
    <script src="index.js"></script>
    

</body>
</html>
