<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor</title>
    <link rel="stylesheet" href="index.css">
</head>
<body >
    <h1>Rock-Paper-Scissor</h1>
    
<!-- img div -->
    <div class="choices">
        <div class="choice" id="Rock">
            <img src="./images/rock.png.jpg" alt="Rock" >
        </div>

        <div class="choice" id="Paper">
            <img src="./images/paper.png.jpg" alt="Paper" >
        </div>

        <div class="choice" id="Scissor">
            <img src="./images/scissor.png.jpg" alt="Scissor" >
        </div>

    </div>
    
<!-- score calculate div  -->
    <div class="score-board">

        <div class="score">
            
            <p id="gestureSelect1">--Select--</p>
            <p id="u-score">0</p>
            <p>Your Points!</p>
        </div>

        <div class="score">
             <p id="gestureSelect2">--Select--</p>             
            <p id="sys-score">0</p>
            <p>System Points!</p>
        </div>

    </div>

<!-- result massage show -->
 <div class="mssg-cont">
    <p id="msg">Your Turn!!</p>
    <button id="btnRound">Play Next Round</button>


<footer >
    <p id="footer">
        Developed by Krish Kumar © 2026.| Rock Paper Scissors Game | All Rights Reserved.
    </p> 
</footer>

    <script src="index.js"></script>
 </div>
</body>
</html>
