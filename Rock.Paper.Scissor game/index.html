<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Rock-Paper-Scissor</h1>
    
<!-- img div -->
    <div class="choices">
        <div class="choice" id="rock">
            <img src="./images/rock.png.jpg" alt="rock" >
        </div>

        <div class="choice" id="paper">
            <img src="./images/paper.png.jpg" alt="paper" >
        </div>

        <div class="choice" id="scissor">
            <img src="./images/scissor.png.jpg" alt="scissor" >
        </div>

    </div>
    
<!-- score calculate div  -->
    <div class="score-board">

        <div class="score" >
            <p id="u-score">0</p>
            <p>You Points!</p>
        </div>

        <div class="score" >
            <p id="sys-score">0</p>
            <p>System Points!</p>
        </div>

    </div>

<!-- result massage show -->
 <div class="mssg-cont">
    <p id="msg">Your Turn!!</p>



    <script src="index.js"></script>
 </div>
</body>
</html>
